apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
  annotations:
    kubernetes.io/change-cause: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb
    spec:
      container:
      - name: mongodb
        image: annurukulasekhar/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  selector:
    project: roboshop
    tier: db
    component: mongodb
ports:
  protocol: TCP
  port: 27017
  targetPort: 27017
  